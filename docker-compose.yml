services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: goodjob
      POSTGRES_PASSWORD: goodjob
      POSTGRES_DB: goodjob
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodjob"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: